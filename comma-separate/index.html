          <svg class="faq-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <div class="faq-answer" id="faq1-answer">
          <p>A <strong>delimiter</strong> is a character used to separate individual items in a list of data. When you export a spreadsheet column or pull a result set from a database, each value occupies its own row. But many systems - SQL queries, programming language arrays, API calls, and CSV files - require all those values to appear on a single line, separated by a consistent character. That character is the delimiter.</p>
          <p>The comma became the universal default because the comma-separated values (CSV) format has been a data interchange standard since the early days of personal computing. Virtually every database, spreadsheet application, and programming language understands a comma-separated list without any additional configuration. When in doubt, use a comma. However, there are valid reasons to choose alternatives: a semicolon is the default list separator in European locales (where a comma is used as the decimal point), a pipe character <code>|</code> is useful when your data itself contains commas, and a space is common for simple shell commands and command-line arguments.</p>
        </div>

          Why do I need single quotes for a SQL IN clause, and what is an IN clause?
          <svg class="faq-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <div class="faq-answer" id="faq2-answer">
          <p>A <strong>SQL IN clause</strong> is a filter condition inside a database query that lets you match a column against a list of possible values instead of writing dozens of separate <code>OR</code> conditions. For example, instead of writing <code>WHERE status = 'active' OR status = 'pending' OR status = 'review'</code>, you write the far more readable <code>WHERE status IN ('active', 'pending', 'review')</code>. The result is identical, but the IN clause is dramatically easier to read, maintain, and extend.</p>
          <p>SQL requires that text and string values be wrapped in <strong>single quotes</strong> because the SQL language standard uses single quotes to denote string literals. Double quotes, in most SQL dialects (PostgreSQL, MySQL, SQLite, SQL Server), are reserved for identifiers like table names and column names - not values. If you forget the quotes around a text value, the database engine will interpret the word as a column name and throw an error. When your values are integers or numeric IDs, quotes are optional and sometimes even discouraged. For everything else - names, email addresses, status codes, text identifiers - always use single quotes in SQL.</p>
          <p>This tool's "Single Quotes" wrapping option automates that entire quoting step. Paste 50 account IDs, choose single quotes, and the output is immediately ready to drop directly into a <code>WHERE id IN (...)</code> clause in your database client.</p>
        </div>
      </div>

      <!-- FAQ 3 -->
      <div class="faq-item">
        <button class="faq-question" aria-expanded="false" aria-controls="faq3-answer">
          How does trimming whitespace prevent database errors?
          <svg class="faq-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <div class="faq-answer" id="faq3-answer">
          <p><strong>Whitespace trimming</strong> means automatically removing any invisible space characters that appear before the first character or after the last character of a value. When you copy a column from a spreadsheet, a PDF, or a poorly formatted report, it is extremely common for each value to carry hidden leading or trailing spaces that are invisible to the human eye. The word <code>apple</code> and the string <code> apple</code> (with a leading space) look identical when you read them, but a database treats them as two completely different values.</p>
          <p>This creates a category of bug that is notoriously difficult to diagnose. A developer will run <code>WHERE fruit_name IN ('apple')</code>, get zero rows back, and spend an hour wondering why a record they can clearly see in the table is not being matched. The answer is almost always a hidden space. The stored value is <code>' apple'</code> or <code>'apple '</code>, not <code>'apple'</code>. Enabling the "Trim whitespace" option in this tool strips those invisible characters from every item before building the final list, ensuring that what you see is exactly what gets sent to the database. It is a small checkbox that prevents a very large category of frustrating, hard-to-spot data errors.</p>
        </div>
      </div>

      <!-- FAQ 4 -->
      <div class="faq-item">
        <button class="faq-question" aria-expanded="false" aria-controls="faq4-answer">
          What is an array, and when should I use double quotes instead of single quotes?
          <svg class="faq-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <div class="faq-answer" id="faq4-answer">
          <p>An <strong>array</strong> is a fundamental data structure in virtually every programming language. It is an ordered collection of items stored as a single variable. In JavaScript, you might write <code>const fruits = ["apple", "banana", "cherry"]</code>. In Python, you would write <code>fruits = ["apple", "banana", "cherry"]</code>. In both cases, the items inside the array are separated by commas and wrapped in double quotes (or single quotes, depending on the language's convention).</p>
          <p>The choice between single quotes and double quotes depends on where the output is going. For SQL databases (MySQL, PostgreSQL, SQLite, SQL Server, Oracle), single quotes are the correct and safe choice for string literals, as described above. For JSON data (used in APIs, configuration files, and NoSQL databases like MongoDB), the JSON specification requires double quotes exclusively - single-quoted strings are technically invalid JSON. For JavaScript and Python arrays, both single and double quotes are accepted, but double quotes are the more widely adopted convention for strings that may be shared with other systems. When you need your output to be valid JSON-compatible data, always use double quotes.</p>
        </div>
      </div>

      <!-- FAQ 5 -->
      <div class="faq-item">
        <button class="faq-question" aria-expanded="false" aria-controls="faq5-answer">
          How does this tool protect my sensitive corporate data and database IDs?
          <svg class="faq-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <div class="faq-answer" id="faq5-answer">
          <p>All text processing performed by this tool happens entirely within your own web browser, on your own computer or device. When you paste a list of customer IDs, account numbers, email addresses, or any other sensitive values into the input box, that data is processed by JavaScript running locally in your browser tab. It is never sent to any server, never logged, and never stored anywhere outside of your browser's active memory. When you close or refresh the tab, the data is gone entirely.</p>
          <p>This is sometimes called <strong>client-side processing</strong> or in-browser processing. The technical mechanism is straightforward: all of the conversion logic - splitting lines, trimming spaces, removing duplicates, wrapping in quotes, joining with a delimiter - is implemented as JavaScript that was delivered to your browser when the page loaded. After that initial page load, the tool requires no internet connection at all to function. You could disconnect from the internet entirely and the tool would continue to work perfectly. There are no API calls, no analytics pipelines capturing your pasted content, and no server-side logging of any kind. This architecture makes the tool safe to use with proprietary internal IDs, personally identifiable information, and any data subject to organizational data handling policies.</p>
        </div>
      </div>

  <!-- ============================================================
       JAVASCRIPT - all conversion logic
  ============================================================ -->
  <script>
    "use strict";

    // ---- Element references ----
    const inputArea      = document.getElementById("input-area");
    const outputArea     = document.getElementById("output-area");
    const delimiterSel   = document.getElementById("delimiter-select");
    const quoteSel       = document.getElementById("quote-select");
    const optRemEmpty    = document.getElementById("opt-remove-empty");
    const optTrim        = document.getElementById("opt-trim");
    const optDedup       = document.getElementById("opt-dedup");
    const btnCopy        = document.getElementById("btn-copy");
    const copyLabel      = document.getElementById("copy-label");
    const btnClear       = document.getElementById("btn-clear");
    const metricTotal    = document.getElementById("metric-total");
    const metricDupes    = document.getElementById("metric-dupes");
    const footerYear     = document.getElementById("footer-year");

    // Set current year in footer
    footerYear.textContent = new Date().getFullYear();

    // ---- Core conversion function ----
    function convert() {
      const rawText   = inputArea.value;
      const delimiter = delimiterSel.value === "\\n" ? "\n" : delimiterSel.value;
      const quote     = quoteSel.value;
      const removeEmpty = optRemEmpty.checked;
      const doTrim      = optTrim.checked;
      const doDedup     = optDedup.checked;

      // Split the raw input into individual lines
      let lines = rawText.split("\n");

      // Step 1: Trim whitespace from each item (if enabled)
      if (doTrim) {
        lines = lines.map(line => line.trim());
      }

      // Step 2: Remove empty lines (if enabled)
      if (removeEmpty) {
        lines = lines.filter(line => line.length > 0);
      }

      // Step 3: Remove duplicate entries (if enabled)
      let dupesRemoved = 0;
      if (doDedup) {
        const seen = new Set();
        const deduped = [];
        for (const line of lines) {
          if (!seen.has(line)) {
            seen.add(line);
            deduped.push(line);
          } else {
            dupesRemoved++;
          }
        }
        lines = deduped;
      }

      // Update metrics display
      metricTotal.textContent = lines.length;
      metricDupes.textContent = dupesRemoved;

      // If there is nothing to process, clear the output
      if (lines.length === 0) {
        outputArea.value = "";
        return;
      }

      // Step 4: Wrap each item in the chosen quote character
      const items = lines.map(line => quote + line + quote);

      // Step 5: Join all items with the chosen delimiter
      //         For "New Line" delimiter, no space is added between items.
      //         For all other delimiters, add a single space after each separator
      //         for readability.
      let joined;
      if (delimiter === "\n") {
        joined = items.join("\n");
      } else {
        joined = items.join(delimiter + " ");
      }

      outputArea.value = joined;
    }

    // ---- Wire up real-time conversion on any input or settings change ----
    inputArea.addEventListener("input",   convert);
    delimiterSel.addEventListener("change", convert);
    quoteSel.addEventListener("change",     convert);
    optRemEmpty.addEventListener("change",  convert);
    optTrim.addEventListener("change",      convert);
    optDedup.addEventListener("change",     convert);

    // ---- Copy to Clipboard ----
    btnCopy.addEventListener("click", async () => {
      const text = outputArea.value;
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
      } catch (err) {
        // Fallback for older browsers or non-HTTPS environments
        outputArea.select();
        document.execCommand("copy");
      }

      // Show "Copied!" feedback
      btnCopy.classList.add("copied");
      copyLabel.textContent = "Copied!";

      setTimeout(() => {
        btnCopy.classList.remove("copied");
        copyLabel.textContent = "Copy to Clipboard";
      }, 2000);
    });

    // ---- Clear All ----
    btnClear.addEventListener("click", () => {
      inputArea.value  = "";
      outputArea.value = "";
      metricTotal.textContent = "0";
      metricDupes.textContent = "0";
      inputArea.focus();
    });

    // ---- FAQ accordion ----
    document.querySelectorAll(".faq-question").forEach(btn => {
      btn.addEventListener("click", () => {
        const item     = btn.closest(".faq-item");
        const isOpen   = item.classList.contains("open");
        const answer   = item.querySelector(".faq-answer");

        // Toggle this item
        item.classList.toggle("open");
        btn.setAttribute("aria-expanded", String(!isOpen));
      });
    });

    // ---- Run conversion once on load (handles browser autofill edge cases) ----
    convert();
  </script>
