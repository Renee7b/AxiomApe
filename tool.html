<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ─── SEO meta tags are injected by JS below ─────────────────── -->
  <title>Loading… | AxiomApe</title>
  <meta name="description" content="" />
  <link rel="canonical" href="" id="canonical-link" />

  <!-- ─── Open Graph (filled dynamically) ─────────────────────────── -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="AxiomApe" />
  <meta property="og:title"       content="" id="og-title" />
  <meta property="og:description" content="" id="og-desc" />
  <meta property="og:url"         content="" id="og-url" />

  <!-- ─── Structured Data placeholder (filled dynamically) ────────── -->
  <script type="application/ld+json" id="schema-org">{}</script>

  <style>
    /* ── Reset & tokens ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a24;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8eaf0;
      --muted:     #7a8094;
      --accent:    #6c63ff;
      --accent2:   #00d2a8;
      --radius:    14px;
      --ease:      0.22s cubic-bezier(.4,0,.2,1);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Site header ──────────────────────────────────────────────── */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .site-header .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--text);
    }

    .site-header .logo span {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6c63ff, #00d2a8);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .site-header .back-link {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color var(--ease);
    }
    .site-header .back-link:hover { color: var(--text); }

    /* ── Ad slots ──────────────────────────────────────────────────── */
    .ad-slot {
      width: 100%;
      max-width: 728px;
      margin: 0 auto;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: monospace;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 8px;
      text-align: center;
    }
    .ad-wrap { padding: 12px 24px; background: var(--bg); }

    /* ── Tool iframe ───────────────────────────────────────────────── */
    .tool-frame-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #tool-frame {
      flex: 1;
      width: 100%;
      border: none;
      min-height: calc(100vh - 52px - 114px); /* viewport minus header minus ad slots */
    }

    /* ── Loading / error states ────────────────────────────────────── */
    #loading-screen, #error-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 48px;
      text-align: center;
    }
    #error-screen { display: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-screen p { color: var(--muted); font-size: 0.9rem; }

    #error-screen h2 { font-size: 1.4rem; }
    #error-screen p  { color: var(--muted); font-size: 0.9rem; max-width: 420px; }
    #error-screen a  { color: var(--accent); text-decoration: none; }

    /* ── Site footer ───────────────────────────────────────────────── */
    .site-footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 18px 24px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .site-footer nav { display: flex; justify-content: center; gap: 24px; margin-bottom: 6px; }
    .site-footer nav a { color: var(--muted); text-decoration: none; transition: color var(--ease); }
    .site-footer nav a:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- ══ SITE HEADER ══════════════════════════════════════════════ -->
  <header class="site-header">
    <a class="logo" href="/">
      <span>🦍</span>
      AxiomApe
    </a>
    <a class="back-link" href="/">← All Tools</a>
  </header>

  <!-- ══ TOP AD ══════════════════════════════════════════════════ -->
  <div class="ad-wrap">
    <div class="ad-slot" id="ad-top">
      <!-- ADSENSE_AD_UNIT_TOP -->
      Ad space · 728×90
    </div>
  </div>

  <!-- ══ LOADING STATE ════════════════════════════════════════════ -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Loading tool…</p>
  </div>

  <!-- ══ ERROR STATE ══════════════════════════════════════════════ -->
  <div id="error-screen">
    <h2>Tool Not Found</h2>
    <p id="error-message">We couldn't find a tool at this URL. It may have moved or the link may be broken.</p>
    <a href="/">← Back to all tools</a>
  </div>

  <!-- ══ TOOL IFRAME (hidden until loaded) ════════════════════════ -->
  <div class="tool-frame-wrap" id="frame-wrap" style="display:none">
    <iframe id="tool-frame" title="Tool" loading="lazy"></iframe>
  </div>

  <!-- ══ BOTTOM AD ════════════════════════════════════════════════ -->
  <div class="ad-wrap" id="ad-bottom-wrap" style="display:none">
    <div class="ad-slot" id="ad-bottom">
      <!-- ADSENSE_AD_UNIT_BOTTOM -->
      Ad space · 728×90
    </div>
  </div>

  <!-- ══ SITE FOOTER ══════════════════════════════════════════════ -->
  <footer class="site-footer">
    <nav>
      <a href="/about.html">About</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/contact.html">Contact</a>
    </nav>
    <p>© <span id="yr"></span> AxiomApe · Free online tools for everyone</p>
  </footer>

  <script>
    // ── Helpers ─────────────────────────────────────────────────────
    document.getElementById('yr').textContent = new Date().getFullYear();

    /**
     * Extract the tool slug from the current URL.
     *
     * Supports three URL patterns:
     *   1. Clean path  →  axiomape.com/scientific-calculator
     *   2. Query param →  axiomape.com/tool.html?t=scientific-calculator
     *   3. Hash        →  axiomape.com/tool.html#scientific-calculator  (GitHub Pages fallback)
     */
    function getSlugFromURL() {
      // 1. Query param  ?t=slug  or  ?tool=slug
      const params = new URLSearchParams(window.location.search);
      if (params.get('t'))    return params.get('t');
      if (params.get('tool')) return params.get('tool');

      // 2. Hash  #slug
      if (window.location.hash) {
        return window.location.hash.replace(/^#\/?/, '');
      }

      // 3. Clean path  /slug  or  /slug/
      const path = window.location.pathname.replace(/\/$/, '');
      const parts = path.split('/').filter(Boolean);
      // The last segment that isn't "tool.html" or "index.html"
      const reserved = new Set(['tool.html', 'index.html', '']);
      for (let i = parts.length - 1; i >= 0; i--) {
        if (!reserved.has(parts[i])) return parts[i];
      }
      return null;
    }

    // ── Main init ────────────────────────────────────────────────────
    (async function init() {
      const slug = getSlugFromURL();

      if (!slug) {
        showError('No tool specified in the URL.');
        return;
      }

      let tools;
      try {
        const res = await fetch('/tools.json');
        if (!res.ok) throw new Error('Could not load tools.json');
        tools = await res.json();
      } catch (err) {
        showError('Failed to load the tools database. Please try again.');
        return;
      }

      const tool = tools.find(t => t.slug === slug);

      if (!tool) {
        showError(`No tool found with slug "${slug}". Check the URL and try again.`);
        return;
      }

      // ── Inject SEO meta tags ──────────────────────────────────────
      const canonicalURL = `https://axiomape.com/${tool.slug}/`;

      document.title = tool.title || `${tool.name} | AxiomApe`;

      setMeta('description',       tool.description);
      setMeta('keywords',          tool.keywords);
      setAttr('#canonical-link',   'href', canonicalURL);
      setAttr('#og-title',         'content', document.title);
      setAttr('#og-desc',          'content', tool.description);
      setAttr('#og-url',           'content', canonicalURL);

      // ── Structured data (WebApplication schema) ───────────────────
      const schema = {
        "@context":         "https://schema.org",
        "@type":            "WebApplication",
        "name":             tool.name,
        "description":      tool.description,
        "url":              canonicalURL,
        "applicationCategory": "UtilityApplication",
        "operatingSystem":  "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "provider": {
          "@type": "Organization",
          "name":  "AxiomApe",
          "url":   "https://axiomape.com"
        }
      };
      document.getElementById('schema-org').textContent = JSON.stringify(schema, null, 2);

      // ── Load the tool via iframe ──────────────────────────────────
      const frame = document.getElementById('tool-frame');
      frame.title = tool.name;

      // Point to the tool's own index.html inside its subdirectory
      const toolSrc = `/${tool.slug}/index.html`;
      frame.src = toolSrc;

      frame.addEventListener('load', function onLoad() {
        frame.removeEventListener('load', onLoad);
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('frame-wrap').style.display    = 'flex';
        document.getElementById('ad-bottom-wrap').style.display = 'block';
      });

      frame.addEventListener('error', function onErr() {
        frame.removeEventListener('error', onErr);
        showError(`The tool file for "${tool.name}" could not be loaded. The file may be missing.`);
      });
    })();

    // ── Utility functions ─────────────────────────────────────────────
    function setMeta(name, content) {
      if (!content) return;
      let el = document.querySelector(`meta[name="${name}"]`);
      if (!el) {
        el = document.createElement('meta');
        el.setAttribute('name', name);
        document.head.appendChild(el);
      }
      el.setAttribute('content', content);
    }

    function setAttr(selector, attr, value) {
      const el = document.querySelector(selector);
      if (el && value) el.setAttribute(attr, value);
    }

    function showError(msg) {
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('error-screen').style.display   = 'flex';
      document.getElementById('error-message').textContent    = msg;
    }
  </script>

</body>
</html>
