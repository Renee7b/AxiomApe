<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caps Converter - Change Text Case Online | AxiomApe</title>
  <meta name="description" content="Free online case converter. Transform any text to UPPERCASE, lowercase, Title Case, Sentence case, camelCase, or toggle case instantly in your browser." />
  <meta name="keywords" content="caps converter, case converter, uppercase, lowercase, title case, sentence case, camelcase, text transformer" />
  <link rel="canonical" href="https://axiomape.com/caps-converter/" />
  <script src="/js/site-chrome.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0f14;
      --surface: #161a24;
      --surface2:#1e2333;
      --border:  rgba(255,255,255,0.08);
      --text:    #e8eaf0;
      --muted:   #7a8094;
      --accent:  #6c63ff;
      --radius:  12px;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    h1 {
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 800;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 28px;
    }
    /* ── Mode buttons ── */
    .modes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .mode-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .mode-btn:hover { color: var(--text); border-color: var(--accent); }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    /* ── Textareas ── */
    .io-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 580px) { .io-row { grid-template-columns: 1fr; } }
    .io-box label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 7px;
    }
    textarea {
      width: 100%;
      height: 240px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: var(--accent); }
    #input-text::placeholder { color: var(--muted); }
    /* ── Action bar ── */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); }
    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 16px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .stats span { font-weight: 700; color: var(--text); }
    /* ── Copy feedback ── */
    .copy-feedback {
      font-size: 0.78rem;
      color: #00d2a8;
      margin-left: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .copy-feedback.show { opacity: 1; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Caps Converter</h1>
  <p class="subtitle">Select a case, paste your text, get the result instantly.</p>

  <!-- Mode buttons -->
  <div class="modes" role="group" aria-label="Text case options">
    <button class="mode-btn active" data-mode="upper">UPPERCASE</button>
    <button class="mode-btn"        data-mode="lower">lowercase</button>
    <button class="mode-btn"        data-mode="title">Title Case</button>
    <button class="mode-btn"        data-mode="sentence">Sentence case</button>
    <button class="mode-btn"        data-mode="camel">camelCase</button>
    <button class="mode-btn"        data-mode="pascal">PascalCase</button>
    <button class="mode-btn"        data-mode="snake">snake_case</button>
    <button class="mode-btn"        data-mode="kebab">kebab-case</button>
    <button class="mode-btn"        data-mode="toggle">tOGGLE cASE</button>
    <button class="mode-btn"        data-mode="alt">aLtErNaTiNg</button>
  </div>

  <!-- Input / Output -->
  <div class="io-row">
    <div class="io-box">
      <label for="input-text">Your text</label>
      <textarea id="input-text" placeholder="Paste or type your text here…" spellcheck="false"></textarea>
    </div>
    <div class="io-box">
      <label for="output-text">Result</label>
      <textarea id="output-text" readonly spellcheck="false"></textarea>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="copy-btn">Copy Result</button>
    <span class="copy-feedback" id="copy-fb">Copied!</span>
    <button class="btn btn-ghost" id="clear-btn">Clear</button>
    <button class="btn btn-ghost" id="swap-btn">↕ Swap</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    Characters: <span id="stat-chars">0</span>&ensp;
    Words: <span id="stat-words">0</span>&ensp;
    Lines: <span id="stat-lines">0</span>
  </div>
</div>

<script>
  const inputEl  = document.getElementById('input-text');
  const outputEl = document.getElementById('output-text');
  const modeBtns = document.querySelectorAll('.mode-btn');
  let currentMode = 'upper';

  /* ── Case transforms ──────────────────────────────────────── */
  function transformText(text, mode) {
    switch (mode) {
      case 'upper':    return text.toUpperCase();
      case 'lower':    return text.toLowerCase();
      case 'title':    return text.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
      case 'sentence': return text.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase());
      case 'camel':    return text.toLowerCase()
                         .replace(/[^a-zA-Z0-9]+(.)/g, (_, c) => c.toUpperCase())
                         .replace(/^[A-Z]/, c => c.toLowerCase());
      case 'pascal':   return text.toLowerCase()
                         .replace(/(^|[^a-zA-Z0-9])(.)/g, (_, _sep, c) => c.toUpperCase());
      case 'snake':    return text.trim().toLowerCase().replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_|_$/g, '');
      case 'kebab':    return text.trim().toLowerCase().replace(/[^a-zA-Z0-9]+/g, '-').replace(/^-|-$/g, '');
      case 'toggle':   return text.split('').map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join('');
      case 'alt':      let i = 0; return text.split('').map(c => /[a-zA-Z]/.test(c) ? (i++ % 2 === 0 ? c.toLowerCase() : c.toUpperCase()) : c).join('');
      default:         return text;
    }
  }

  function update() {
    const raw = inputEl.value;
    outputEl.value = transformText(raw, currentMode);
    document.getElementById('stat-chars').textContent = raw.length;
    document.getElementById('stat-words').textContent = raw.trim() ? raw.trim().split(/\s+/).length : 0;
    document.getElementById('stat-lines').textContent = raw ? raw.split('\n').length : 0;
  }

  /* ── Event listeners ──────────────────────────────────────── */
  inputEl.addEventListener('input', update);

  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      update();
    });
  });

  document.getElementById('copy-btn').addEventListener('click', () => {
    if (!outputEl.value) return;
    navigator.clipboard.writeText(outputEl.value).then(() => {
      const fb = document.getElementById('copy-fb');
      fb.classList.add('show');
      setTimeout(() => fb.classList.remove('show'), 1800);
    });
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    inputEl.value = '';
    outputEl.value = '';
    update();
  });

  document.getElementById('swap-btn').addEventListener('click', () => {
    inputEl.value = outputEl.value;
    update();
  });
</script>
</body>
</html>
