<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting… | AxiomApe</title>
  <!--
    ══════════════════════════════════════════════════════════════════
    GITHUB PAGES SPA ROUTING TRICK
    ══════════════════════════════════════════════════════════════════

    When GitHub Pages can't find /scientific-calculator it serves this
    404.html instead. We instantly redirect to:
      /?/scientific-calculator

    Then index.html (or tool.html) reads the ?/ prefix, strips it,
    reconstructs the clean path, and renders the right tool.

    NOTE: Google Search Console will eventually see these as soft-404s
    unless you also submit a sitemap with the canonical URLs. The best
    long-term solution is Cloudflare Pages or Netlify (see README).
    ══════════════════════════════════════════════════════════════════
  -->
  <script>
    // Encode the full path + query + hash into a ?/ redirect
    // so the main page can decode it without a server.
    var l = window.location;
    var path = l.pathname.slice(1);           // "scientific-calculator"
    var search = l.search ? l.search + '&' : '?';
    var redirect = l.protocol + '//' + l.hostname +
      (l.port ? ':' + l.port : '') +
      '/' + search + '/' + path +
      (l.hash || '');
    window.location.replace(redirect);
  </script>
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
